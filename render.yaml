services:
  - type: web
    name: su-member-service-mvp
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
